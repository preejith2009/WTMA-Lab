<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartLearn 3.1 – CBSE 6 & 7</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Segoe UI,Arial;background:#eef2f7}
header{background:linear-gradient(135deg,#4a90e2,#6a5acd);color:#fff;padding:18px;text-align:center}
nav{display:flex;justify-content:space-around;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.1)}
nav button{border:none;background:none;padding:14px;font-weight:600;cursor:pointer}
section{display:none;padding:20px}
.active{display:block}
.card{background:#fff;padding:16px;margin:12px 0;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.05)}
button.primary{background:#4a90e2;color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
.quiz-option{display:block;width:100%;margin:8px 0;padding:10px;border-radius:8px;border:1px solid #ccc;background:#f9f9f9;cursor:pointer}
.quiz-option:hover{background:#e6f0ff}
.progress-bar{height:18px;background:#ddd;border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:#4caf50;width:0%}
.badge{font-size:22px;margin-top:10px}
#popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);color:#fff;text-align:center;padding-top:150px;font-size:22px}
</style>
</head>
<body>

<header>
<h1>📘 SmartLearn 3.1</h1>
<p>CBSE Class 6 & 7 • Learn • Practice • Achieve</p>
</header>

<nav>
<button onclick="show('login')">Login</button>
<button onclick="show('quiz')">Quiz</button>
<button onclick="show('todo')">Tasks</button>
<button onclick="show('progress')">Progress</button>
<button onclick="show('certificate')">Certificate</button>
</nav>

<section id="login" class="active">
<div class="card">
<h2>🔐 Student Login</h2>
<input id="username" placeholder="Enter your name"><br><br>
<button class="primary" onclick="login()">Start Learning</button>
<p id="welcome"></p>
</div>
</section>

<section id="quiz">
<div class="card">
<h2>🧠 CBSE Quiz</h2>
<select onchange="selectQuiz(this.value)">
<option value="">Select Quiz</option>
<option value="math6">Maths 6</option>
<option value="sci6">Science 6</option>
<option value="math7">Maths 7</option>
<option value="sci7">Science 7</option>
</select>
<p id="q"></p>
<div id="opts"></div>
<button id="nextBtn" class="primary" onclick="nextQ()" disabled>Next</button>
<p id="result"></p>
</div>
</section>

<section id="todo">
<div class="card">
<h2>📝 Tasks</h2>
<input id="task" placeholder="Enter task">
<button class="primary" onclick="addTask()">Add</button>
<ul id="taskList"></ul>
</div>
</section>

<section id="progress">
<div class="card">
<h2>📊 Progress</h2>
<p id="studentInfo"></p>
<div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
<p id="xpText"></p>
<div id="badge" class="badge"></div>
</div>
</section>

<section id="certificate">
<div class="card" id="certMsg"></div>
</section>

<div id="popup">
🎉 <b>Great Job!</b> 🎉<br><br>
<span id="msg"></span><br>
⭐ +<span id="pts"></span> XP<br><br>
<button class="primary" onclick="closePopup()">Continue</button>
</div>

<script>
/* ---------- STATE ---------- */
let state={student:localStorage.getItem("student")||"", xp:Number(localStorage.getItem("xp"))||0};

/* ---------- NAV ---------- */
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(id==="progress"||id==="certificate") renderProgress();
}

/* ---------- LOGIN ---------- */
function login(){
let u=username.value.trim();
if(!u){alert("Enter your name");return;}
state.student=u;
localStorage.setItem("student",u);
welcome.innerText="Welcome "+u+" 👋";
}

/* ---------- TOUGH QUIZ SETUP ---------- */
// Template structure for 1,000 questions
// Each subject: ~250 questions
// Here we show sample entries. You can expand to 250 per subject
const quizzes={
math6:[{q:"Evaluate 12*15-3^2", o:["171","177","165","180"], a:1}],
sci6:[{q:"Chemical formula of H2SO4?", o:["H2SO4","HCl","NaOH","H2O"], a:0}],
math7:[{q:"Solve 2x-5=9, x=?", o:["7","-7","5","2"], a:0}],
sci7:[{q:"Heart pumps which fluid?", o:["Blood","Lymph","Saliva","Air"], a:0}]
};

/* ---------- QUIZ LOGIC ---------- */
let quiz=[],qi=0,answered=false;
function selectQuiz(k){
if(!quizzes[k]) return;
quiz=shuffle(quizzes[k]).slice(0,20); // load only 20 per session
qi=0;
loadQ();
}
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}
function loadQ(){
answered=false; nextBtn.disabled=true;
q.innerText=`${quiz[qi].q} (${qi+1}/${quiz.length})`;
opts.innerHTML="";
quiz[qi].o.forEach((op,i)=>{
let b=document.createElement("button");
b.className="quiz-option"; b.innerText=op;
b.onclick=()=>{if(answered)return; answered=true;
if(i===quiz[qi].a) reward(20,"Correct!"); else reward(5,"Try next!");
nextBtn.disabled=false;};
opts.appendChild(b);
});
}
function nextQ(){qi++; if(qi<quiz.length) loadQ(); else result.innerText="Quiz Completed 🎯";}

/* ---------- TASKS ---------- */
function addTask(){
let t=task.value.trim(); if(!t)return;
let li=document.createElement("li");
li.innerText=t+" ✔"; li.onclick=()=>{li.remove(); reward(10,"Task done!");};
taskList.appendChild(li); task.value="";
}

/* ---------- REWARDS ---------- */
const praises=["Excellent work!","Keep it up!","You're learning fast!","Fantastic effort!"];
function reward(p,msg){
state.xp+=p; localStorage.setItem("xp",state.xp);
popup.style.display="block"; msg.innerText=praises[Math.floor(Math.random()*praises.length)]+" "+msg;
pts.innerText=p; renderProgress();
}

/* ---------- PROGRESS ---------- */
function renderProgress(){
let level=Math.floor(state.xp/100)+1;
let percent=(state.xp%100);
studentInfo.innerText=`👤 ${state.student} | Level ${level}`;
bar.style.width=percent+"%";
xpText.innerText=state.xp+" XP";
let badgeText="🌱 Beginner";
if(state.xp>=100) badgeText="🥉 Bronze Learner";
if(state.xp>=200) badgeText="🥈 Silver Scholar";
if(state.xp>=300) badgeText="🥇 Gold Champion";
badge.innerText=badgeText;
if(state.xp>=300){
certMsg.innerHTML=`<h2>🎓 Certificate of Achievement</h2><p>This certifies that <b>${state.student}</b> has successfully completed SmartLearn activities.</p>`;
}else{certMsg.innerHTML="<h3>🔒 Certificate Locked</h3><p>Earn 300 XP</p>";}
}
function closePopup(){popup.style.display="none";}
if(state.student){welcome.innerText="Welcome back "+state.student+" 👋";}
renderProgress();
</script>

</body>
</html>
