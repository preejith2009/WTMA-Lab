<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control Structures Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* (Keeping your exact styling unchanged) */

body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.quiz-container{
    width:70%;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
    animation:fadeIn 1s ease;
}

h2{ margin-bottom:20px; }

.option{
    display:block;
    margin:12px 0;
    padding:12px;
    background:#f3f3f3;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#dfe9ff;
    transform:scale(1.03);
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:linear-gradient(45deg,#42a5f5,#478ed1);
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}

.result-card{
    text-align:center;
    padding:40px;
    border-radius:16px;
    background:linear-gradient(135deg,#43cea2,#185a9d);
    color:white;
    animation:zoomIn 1s ease;
}

.score{
    font-size:50px;
    font-weight:bold;
    margin:20px 0;
}

.bar{
    width:100%;
    height:20px;
    background:#ffffff55;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
}

.fill{
    height:100%;
    width:0%;
    background:#00ffcc;
    animation:fillBar 2s forwards;
}

body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://i.imgur.com/6RMhx.gif');
    opacity:0;
    pointer-events:none;
}

.show-confetti::after{ opacity:0.4; }

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

@keyframes zoomIn{
from{transform:scale(0.5); opacity:0;}
to{transform:scale(1);}
}

@keyframes fillBar{
from{width:0;}
to{width:var(--percent);}
}

.review-box{
background:#fff;
padding:15px;
margin:15px 0;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="quiz-container">
<div id="quiz"></div>
<button id="nextBtn">Next</button>
<div id="result"></div>
<div id="review"></div>
</div>

<script>

/* CONTROL STRUCTURES QUESTIONS */
/* PYTHON STRING QUESTIONS */

/* PYTHON STRING QUIZ + STRING SLICING QUIZ */

const quizData = [

{
q:"1. Strings are immutable sequences of characters in Python.",
a:[
"True",
"False"
],
correct:0
},

{
q:"2. What is a string in Python?",
a:[
"A collection of numbers",
"A sequence of characters",
"A mathematical operator",
"A loop structure"
],
correct:1
},

{
q:"3. Which function returns the length of a string?",
a:[
"size()",
"length()",
"len()",
"count()"
],
correct:2
},

{
q:"4. Which function converts a string to lowercase?",
a:[
"lower()",
"down()",
"small()",
"case()"
],
correct:0
},

{
q:"5. What does the strip() function do?",
a:[
"Removes characters from beginning and end of a string",
"Splits the string",
"Converts string to uppercase",
"Deletes the string"
],
correct:0
},

{
q:"6. Which operator is used to concatenate two strings?",
a:[
"*",
"+",
"-",
"/"
],
correct:1
},

{
q:"7. What does string slicing do?",
a:[
"Deletes a string",
"Extracts part of a string",
"Converts string to integer",
"Repeats a string"
],
correct:1
},

{
q:"8. Which method checks if a string contains only alphabets?",
a:[
"isdigit()",
"isalpha()",
"isalnum()",
"ischar()"
],
correct:1
},

{
q:"9. How can you reverse a string using slicing?",
a:[
"string[::-1]",
"string[1:]",
"string[::-2]",
"reverse(string)"
],
correct:0
},

{
q:"10. Which function replaces part of a string with another value?",
a:[
"change()",
"swap()",
"replace()",
"modify()"
],
correct:2
},

{
q:"11. Which function splits a string into a list?",
a:[
"break()",
"split()",
"divide()",
"slice()"
],
correct:1
},

{
q:"12. Which function joins list elements into a string?",
a:[
"join()",
"merge()",
"connect()",
"combine()"
],
correct:0
},

{
q:"13. What will be the output?\ntext = \"Python\"\nprint(text[0])",
a:[
"y",
"P",
"n",
"Error"
],
correct:1
},

{
q:"14. What will be the output?\ntext = \"HELLO\"\nprint(text.lower())",
a:[
"HELLO",
"hello",
"Hello",
"error"
],
correct:1
},

{
q:"15. What will be the output?\ntext = \"banana\"\nprint(text.replace(\"a\",\"o\"))",
a:[
"bonono",
"banono",
"bonana",
"banana"
],
correct:0
},

/* ---- NEW STRING SLICING QUESTIONS ---- */

{
q:"16. What will be the output?\ntext = \"Python Programming\"\nprint(text[0:6])",
a:[
"Python Programming",
"Python",
"Program",
"Pytho"
],
correct:1
},

{
q:"17. What will be the output?\ntext = \"Python Programming\"\nprint(text[7:])",
a:[
"Programming",
"Python",
"Program",
"on Programming"
],
correct:0
},

{
q:"18. What will be the output?\ntext = \"PYTHON\"\nprint(text[::2])",
a:[
"PTO",
"PYT",
"YHN",
"PH"
],
correct:0
},

{
q:"19. True or False:\nString slicing in Python is used to extract a part of a string.",
a:[
"True",
"False"
],
correct:0
},

{
q:"20. True or False:\nThe step value in slicing is used to skip characters in the string.",
a:[
"True",
"False"
],
correct:0
}

];


let index=0;
let score=0;
let userAnswers=[];

function loadQuestion(){

let q=quizData[index];

document.getElementById("quiz").innerHTML=`
<h2>${q.q}</h2>
${q.a.map((opt,i)=>
`<label class="option">
<input type="radio" name="opt" value="${i}">
${opt}
</label>`).join("")}
`;

if(index===quizData.length-1)
nextBtn.innerText="Submit";
}

nextBtn.onclick=function(){

let sel=document.querySelector('input[name="opt"]:checked');

if(!sel){alert("Select an answer"); return;}

userAnswers[index]=Number(sel.value);

if(userAnswers[index]===quizData[index].correct)
score++;

index++;

if(index<quizData.length) loadQuestion();
else showResult();
};

function showResult(){

document.body.classList.add("show-confetti");

let percent=Math.round((score/quizData.length)*100);

document.getElementById("quiz").style.display="none";
nextBtn.style.display="none";

document.getElementById("result").innerHTML=`

<div class="result-card">
<h1>🎉 Quiz Completed 🎉</h1>
<div class="score" id="scoreCount">0</div>
<p>You scored ${score} out of ${quizData.length}</p>

<div class="bar">
<div class="fill" style="--percent:${percent}%"></div>
</div>

<p>${percent}%</p>
</div>
`;

animateScore(score);
showReview();
}

function animateScore(finalScore){

let count=0;
let el=document.getElementById("scoreCount");

let interval=setInterval(()=>{
el.innerText=count;
if(count===finalScore) clearInterval(interval);
count++;
},100);
}

function showReview(){

let reviewHTML="<h2 style='margin-top:40px'>Answer Review</h2>";

quizData.forEach((q,i)=>{

let userAns=userAnswers[i];
let correctAns=q.correct;

reviewHTML+=`
<div class="review-box">

<b>${q.q}</b><br><br>

Your Answer:
<span style="color:${userAns===correctAns?'green':'red'}">
${q.a[userAns] ?? "Not Answered"}
</span><br>

Correct Answer:
<span style="color:green">
${q.a[correctAns]}
</span>

</div>
`;
});

document.getElementById("review").innerHTML=reviewHTML;
}

loadQuestion();

</script>
<div style="position:fixed; top:20px; right:25px; z-index:9999;">
    <a href="python_week3_strings.html" 
       style="color:white; text-decoration:underline; font-size:20px; font-weight:bold; letter-spacing:1px;">
       ⬅ Back to Lesson
    </a>
</div>



</body>
</html>
