<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Python Functions Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.quiz-container{
    width:70%;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.option{
    display:block;
    margin:12px 0;
    padding:12px;
    background:#f3f3f3;
    border-radius:10px;
    cursor:pointer;
}

.option:hover{
    background:#dfe9ff;
    transform:scale(1.03);
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:linear-gradient(45deg,#42a5f5,#478ed1);
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}

.result-card{
    text-align:center;
    padding:40px;
    border-radius:16px;
    background:linear-gradient(135deg,#43cea2,#185a9d);
    color:white;
}

.score{
    font-size:50px;
    font-weight:bold;
}

.bar{
    width:100%;
    height:20px;
    background:#ffffff55;
    border-radius:20px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:0%;
    background:#00ffcc;
    animation:fillBar 2s forwards;
}

@keyframes fillBar{
from{width:0;}
to{width:var(--percent);}
}

.review-box{
background:#fff;
padding:15px;
margin:15px 0;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="quiz-container">
<div id="quiz"></div>
<button id="nextBtn">Next</button>
<div id="result"></div>
<div id="review"></div>
</div>

<script>

const quizData = [

{
q:"1. What is a function in Python?",
a:[
"A loop",
"A reusable block of code",
"A variable",
"A condition"
],
correct:1
},

{
q:"2. Which keyword is used to define a function?",
a:["function","def","fun","define"],
correct:1
},

{
q:"3. What is the output?\ndef f(): return 5\nprint(f())",
a:["5","None","Error","0"],
correct:0
},

{
q:"4. What is *args used for?",
a:[
"Multiple return values",
"Multiple arguments",
"Looping",
"Conditions"
],
correct:1
},

{
q:"5. What is default argument?",
a:[
"Argument with fixed value",
"Argument with predefined value",
"Loop variable",
"Input function"
],
correct:1
},

{
q:"6. What will be output?\ndef f(a=5): print(a)\nf()",
a:["5","0","Error","None"],
correct:0
},

{
q:"7. Which keyword returns value from function?",
a:["break","return","print","exit"],
correct:1
},

{
q:"8. What happens if no return statement?",
a:[
"Error",
"Returns None",
"Returns 0",
"Stops program"
],
correct:1
},

{
q:"9. What will be output?\ndef f(x): return x*x\nprint(f(3))",
a:["6","9","3","Error"],
correct:1
},

{
q:"10. Function parameters are:",
a:[
"Values passed",
"Variables in definition",
"Output values",
"Loop values"
],
correct:1
},

{
q:"11. What is recursion?",
a:[
"Looping",
"Function calling itself",
"Condition",
"Iteration"
],
correct:1
},

{
q:"12. What is lambda function?",
a:[
"Named function",
"Anonymous function",
"Loop",
"Class"
],
correct:1
},

{
q:"13. What will be output?\ndef f(a,b): return a+b\nprint(f(2,3))",
a:["5","23","Error","None"],
correct:0
},

{
q:"14. What is correct syntax?",
a:[
"def func:",
"function func()",
"def func():",
"func def()"
],
correct:2
},

{
q:"15. What will be output?\ndef f(): pass\nprint(f())",
a:["0","None","Error","pass"],
correct:1
}

];

let index=0, score=0, userAnswers=[];

function loadQuestion(){
let q=quizData[index];

document.getElementById("quiz").innerHTML=`
<h2>${q.q}</h2>
${q.a.map((opt,i)=>
`<label class="option">
<input type="radio" name="opt" value="${i}">${opt}
</label>`).join("")}
`;

if(index===quizData.length-1)
nextBtn.innerText="Submit";
}

nextBtn.onclick=function(){
let sel=document.querySelector('input[name="opt"]:checked');
if(!sel){alert("Select an answer"); return;}

userAnswers[index]=Number(sel.value);
if(userAnswers[index]===quizData[index].correct) score++;

index++;

if(index<quizData.length) loadQuestion();
else showResult();
};

function showResult(){
let percent=Math.round((score/quizData.length)*100);

document.getElementById("quiz").style.display="none";
nextBtn.style.display="none";

document.getElementById("result").innerHTML=`
<div class="result-card">
<h1>🎉 Quiz Completed 🎉</h1>
<div class="score">${score}</div>
<p>You scored ${score} out of ${quizData.length}</p>

<div class="bar">
<div class="fill" style="--percent:${percent}%"></div>
</div>

<p>${percent}%</p>
</div>
`;

showReview();
}

function showReview(){
let reviewHTML="<h2>Answer Review</h2>";

quizData.forEach((q,i)=>{
reviewHTML+=`
<div class="review-box">
<b>${q.q}</b><br><br>
Your Answer:
<span style="color:${userAnswers[i]===q.correct?'green':'red'}">
${q.a[userAnswers[i]]}
</span><br>
Correct Answer:
<span style="color:green">${q.a[q.correct]}</span>
</div>
`;
});

document.getElementById("review").innerHTML=reviewHTML;
}

loadQuestion();

</script>

<div style="position:fixed; top:20px; right:25px; z-index:9999;">
    <a href="python_week5_function.html" 
       style="color:white; text-decoration:underline; font-size:20px; font-weight:bold; letter-spacing:1px;">
       ⬅ Back to Lesson
    </a>
</div>

</body>
</html>
